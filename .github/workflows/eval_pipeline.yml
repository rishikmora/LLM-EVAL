name: LLM Eval CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly 2 AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run test suite
        run: pytest tests/ -v --tb=short --junit-xml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with: { name: test-results, path: test-results.xml }

  benchmark_regression:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Run nightly benchmark suite
        run: python run_eval.py --suite full --n 3
      - name: Check for regressions
        run: python scripts/check_regression.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with: { name: benchmark-results, path: data/ }

  build_docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t llm-eval-platform:${{ github.sha }} .
      - name: Test container health
        run: |
          docker run -d -p 8080:8080 --name test_api llm-eval-platform:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health
          docker stop test_api
